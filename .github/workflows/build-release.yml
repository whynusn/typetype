name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux:
    name: 打包 - Linux
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 uv
        uses: astral-sh/setup-uv@v4
        with:
          version: '0.9.26'

      - name: 准备构建目录
        run: |
          mkdir -p build-src
          cp -a main.py pyproject.toml uv.lock src resources RinUI config build-src/

      - name: 安装依赖
        run: uv sync --frozen
        working-directory: build-src

      - name: 安装打包依赖
        run: uv run python -m ensurepip --upgrade
        working-directory: build-src

      - name: 升级 Nuitka
        run: uv pip install --upgrade nuitka --index-url https://pypi.org/simple
        working-directory: build-src

      - name: 运行打包
        run: |
          uv run python -m nuitka main.py \
            --follow-imports \
            --enable-plugin=pyside6 \
            --include-qt-plugins=qml \
            --include-package=RinUI \
            --include-data-dir=RinUI=RinUI \
            --include-data-dir=config=config \
            --output-dir=deployment \
            --quiet \
            --noinclude-qt-translations \
            --standalone \
            --noinclude-dlls=libQt6WebEngine* \
            --include-data-dir=src/qml=src/qml \
            --include-data-dir=resources/texts=resources/texts \
            --include-data-files=resources/images/TypeTypeLogo.png=resources/images/TypeTypeLogo.png \
            --include-data-files=resources/fonts/HarmonyOS_Sans_SC_Regular-subset.ttf=resources/fonts/HarmonyOS_Sans_SC_Regular-subset.ttf \
            --include-data-files=resources/fonts/LXGWWenKai-Regular-subset.ttf=resources/fonts/LXGWWenKai-Regular-subset.ttf
        working-directory: build-src

      - name: 创建压缩包
        run: |
          DIST_DIR="build-src/deployment/main.dist"
          if [ -d "$DIST_DIR" ]; then
            tar -czf typetype-linux-amd64.tar.gz -C "$DIST_DIR" .
          else
            echo "未找到打包输出目录 $DIST_DIR"
            exit 1
          fi

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: typetype-linux-amd64
          path: typetype-linux-amd64.tar.gz

  build-windows:
    name: 打包 - Windows
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 uv
        uses: astral-sh/setup-uv@v4
        with:
          version: '0.9.26'

      - name: 准备构建目录
        run: |
          New-Item -ItemType Directory -Force -Path build-src | Out-Null
          Copy-Item -Recurse -Force main.py,pyproject.toml,uv.lock,src,resources,RinUI,config -Destination build-src

      - name: 安装依赖
        run: uv sync --frozen
        working-directory: build-src

      - name: 安装打包依赖
        run: uv run python -m ensurepip --upgrade
        working-directory: build-src

      - name: 升级 Nuitka
        run: uv pip install --upgrade nuitka --index-url https://pypi.org/simple
        working-directory: build-src

      - name: 运行打包
        run: |
          uv run python -m nuitka main.py `
            --follow-imports `
            --enable-plugin=pyside6 `
            --include-qt-plugins=qml `
            --include-package=RinUI `
            --include-data-dir=RinUI=RinUI `
            --include-data-dir=config=config `
            --output-dir=deployment `
            --quiet `
            --noinclude-qt-translations `
            --standalone `
            --noinclude-dlls=Qt6WebEngine* `
            --windows-console-mode=disable `
            --include-windows-runtime-dlls=yes `
            --assume-yes-for-downloads `
            --include-data-dir=src/qml=src/qml `
            --include-data-dir=resources/texts=resources/texts `
            --include-data-files=resources/images/TypeTypeLogo.png=resources/images/TypeTypeLogo.png `
            --include-data-files=resources/fonts/HarmonyOS_Sans_SC_Regular-subset.ttf=resources/fonts/HarmonyOS_Sans_SC_Regular-subset.ttf `
            --include-data-files=resources/fonts/LXGWWenKai-Regular-subset.ttf=resources/fonts/LXGWWenKai-Regular-subset.ttf
        working-directory: build-src

      - name: 创建压缩包
        run: |
          $distDir = "build-src\deployment\main.dist"
          if (Test-Path $distDir) {
            # 列出文件用于调试
            Get-ChildItem $distDir -Recurse -Filter "*WebEngine*" | ForEach-Object { Write-Host "Found: $($_.FullName)" }
            Compress-Archive -Path "$distDir\*" -DestinationPath typetype-windows-amd64.zip
          }
          else {
            Write-Error "未找到打包输出目录 $distDir"
            exit 1
          }

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: typetype-windows-amd64
          path: typetype-windows-amd64.zip

  build-macos:
    name: 打包 - macOS
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 uv
        uses: astral-sh/setup-uv@v4
        with:
          version: '0.9.26'

      - name: 准备构建目录
        run: |
          mkdir -p build-src
          cp -a main.py pyproject.toml uv.lock src resources RinUI config build-src/

      - name: 安装依赖
        run: uv sync --frozen
        working-directory: build-src

      - name: 安装打包依赖
        run: uv run python -m ensurepip --upgrade
        working-directory: build-src

      - name: 升级 Nuitka
        run: uv pip install --upgrade nuitka --index-url https://pypi.org/simple
        working-directory: build-src

      - name: 运行打包
        run: |
          uv run python -m nuitka main.py \
            --follow-imports \
            --enable-plugin=pyside6 \
            --include-qt-plugins=qml \
            --include-package=RinUI \
            --include-data-dir=RinUI=RinUI \
            --include-data-dir=config=config \
            --output-dir=deployment \
            --quiet \
            --noinclude-qt-translations \
            --mode=app \
            --include-data-dir=src/qml=src/qml \
            --include-data-dir=resources/texts=resources/texts \
            --include-data-files=resources/images/TypeTypeLogo.png=resources/images/TypeTypeLogo.png \
            --include-data-files=resources/fonts/HarmonyOS_Sans_SC_Regular-subset.ttf=resources/fonts/HarmonyOS_Sans_SC_Regular-subset.ttf \
            --include-data-files=resources/fonts/LXGWWenKai-Regular-subset.ttf=resources/fonts/LXGWWenKai-Regular-subset.ttf
        working-directory: build-src

      - name: 创建压缩包
        run: |
          DIST_DIR="build-src/deployment/main.app"
          if [ -d "$DIST_DIR" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$DIST_DIR" typetype-macos.zip
          else
            echo "未找到打包输出目录 $DIST_DIR"
            exit 1
          fi

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: typetype-macos
          path: typetype-macos.zip

  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - name: 下载 Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: typetype-linux-amd64
          path: release-assets

      - name: 下载 Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: typetype-windows-amd64
          path: release-assets

      - name: 下载 macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: typetype-macos
          path: release-assets

      - name: 生成变更说明
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --oneline "$PREV_TAG..HEAD" | sed 's/^/- /')
          else
            LOG=$(git log --oneline HEAD | sed 's/^/- /')
          fi
          DELIM=cl_$(date +%s)
          echo "body<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "## What's Changed" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "**Full Changelog**: [${PREV_TAG}...${TAG}](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG})" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/typetype-linux-amd64.tar.gz
            release-assets/typetype-windows-amd64.zip
            release-assets/typetype-macos.zip
          draft: false
          generate_release_notes: true
          body: ${{ steps.changelog.outputs.body }}
          prerelease: false
